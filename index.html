<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ensemble Clustering Review Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
        },
        svg: {
          fontCache: "global",
        },
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <p class="eyebrow">Interactive Review Companion</p>
        <h1>Ensemble Clustering Review Explorer</h1>
        <p id="sourceStamp" class="source-stamp">Loading data...</p>
      </div>
      <div class="header-controls">
        <label class="field search-field">
          <span>Search</span>
          <input id="globalSearch" type="search" autocomplete="off" placeholder="method, venue, category, year, parameter">
        </label>
        <label class="field compact-field">
          <span>Metric</span>
          <select class="metric-select" id="globalMetric"></select>
        </label>
      </div>
      <nav class="tabs" aria-label="Explorer sections">
        <button id="overview-tab" class="tab is-active" type="button" data-tab="overview">Overview</button>
        <button id="ranking-tab" class="tab" type="button" data-tab="ranking">Ranking</button>
        <button id="methods-tab" class="tab" type="button" data-tab="methods">Methods</button>
        <button id="datasets-tab" class="tab" type="button" data-tab="datasets">Datasets</button>
        <button id="heatmap-tab" class="tab" type="button" data-tab="heatmap">Heatmap</button>
      </nav>
    </header>

    <main class="workspace">
      <section id="overview" class="tab-panel is-active" aria-labelledby="overview-tab">
        <div id="overviewStats" class="stat-grid"></div>

        <div class="toolbar">
          <label class="field">
            <span>Big Category</span>
            <select id="overviewBigCategory"></select>
          </label>
          <label class="field">
            <span>Small Category</span>
            <select id="overviewCategory"></select>
          </label>
          <label class="field">
            <span>Venue</span>
            <select id="overviewVenue"></select>
          </label>
          <label class="field compact-field">
            <span>Sort</span>
            <select id="overviewSort">
              <option value="year-desc">Year new-old</option>
              <option value="year-asc">Year old-new</option>
              <option value="method-asc">Method A-Z</option>
              <option value="venue-asc">Venue A-Z</option>
            </select>
          </label>
        </div>

        <section class="panel">
          <div class="section-head">
            <h2>Method Taxonomy</h2>
            <span id="overviewCountLabel" class="muted"></span>
          </div>
          <div class="overview-summary">
            <div id="overviewTaxonomy" class="taxonomy-grid"></div>
          </div>
          <div id="overviewTable" class="table-wrapper overview-table-wrapper"></div>
        </section>
      </section>

      <section id="ranking" class="tab-panel" aria-labelledby="ranking-tab">
        <div class="toolbar">
          <label class="field">
            <span>Big Category</span>
            <select id="rankingBigCategory"></select>
          </label>
          <label class="field">
            <span>Small Category</span>
            <select id="rankingCategory"></select>
          </label>
          <label class="field">
            <span>Venue</span>
            <select id="rankingVenue"></select>
          </label>
        </div>

        <div class="method-layout ranking-layout">
          <section class="panel table-panel">
            <div class="section-head">
              <h2>Average Rank</h2>
              <span id="rankingCountLabel" class="muted"></span>
            </div>
            <div id="rankingTable" class="table-wrapper"></div>
          </section>

          <aside class="panel detail-panel">
            <div id="rankingDetail"></div>
          </aside>
        </div>
      </section>

      <section id="methods" class="tab-panel" aria-labelledby="methods-tab">
        <div class="toolbar">
          <label class="field">
            <span>Category</span>
            <select id="methodCategory"></select>
          </label>
          <label class="field">
            <span>Venue</span>
            <select id="methodVenue"></select>
          </label>
          <label class="field compact-field">
            <span>Sort</span>
            <select id="methodSort">
              <option value="metric-desc">Metric high</option>
              <option value="metric-asc">Metric low</option>
              <option value="runtime-asc">Runtime low</option>
              <option value="runtime-desc">Runtime high</option>
              <option value="method-asc">Method A-Z</option>
            </select>
          </label>
        </div>

        <div class="method-layout">
          <section class="panel table-panel">
            <div class="section-head">
              <h2>Methods</h2>
              <span id="methodCountLabel" class="muted"></span>
            </div>
            <div id="methodTable" class="table-wrapper"></div>
          </section>

          <aside class="panel detail-panel">
            <div id="methodDetail"></div>
          </aside>
        </div>
      </section>

      <section id="datasets" class="tab-panel" aria-labelledby="datasets-tab">
        <div class="toolbar">
          <label class="field wide-field">
            <span>Dataset</span>
            <select id="datasetSelect"></select>
          </label>
        </div>

        <div class="dashboard-grid">
          <section class="panel span-4">
            <div class="section-head">
              <h2>Dataset Profile</h2>
              <span id="datasetMetaLabel" class="muted"></span>
            </div>
            <div id="datasetProfile"></div>
          </section>

          <section class="panel span-8">
            <div class="section-head">
              <h2>Best Methods</h2>
              <span id="datasetMetricLabel" class="muted"></span>
            </div>
            <div id="datasetTopChart" class="chart-frame"></div>
          </section>

          <section class="panel span-12">
            <div class="section-head">
              <h2>Dataset Ranking</h2>
              <span id="datasetRankLabel" class="muted"></span>
            </div>
            <div id="datasetRanking" class="table-wrapper"></div>
          </section>
        </div>
      </section>

      <section id="heatmap" class="tab-panel" aria-labelledby="heatmap-tab">
        <div class="toolbar heatmap-toolbar">
          <label class="field">
            <span>Category</span>
            <select id="heatmapCategory"></select>
          </label>
          <label class="field compact-field">
            <span>Methods</span>
            <select id="heatmapMethodCount">
              <option value="all" selected>All</option>
              <option value="12">12</option>
              <option value="20">20</option>
              <option value="30">30</option>
              <option value="50">50</option>
            </select>
          </label>
          <label class="field wide-field">
            <span>Datasets</span>
            <div id="heatmapDatasetPicker" class="multi-select">
              <button id="heatmapDatasetsButton" class="multi-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="heatmapDatasetsSummary">Loading datasets...</span>
              </button>
              <div id="heatmapDatasetsMenu" class="multi-select-menu" hidden>
                <div id="heatmapDatasetsList" class="multi-select-list" role="listbox" aria-multiselectable="true"></div>
              </div>
            </div>
          </label>
          <div class="button-row">
            <button id="selectAllDatasets" class="secondary-button" type="button">Select all</button>
          </div>
        </div>

        <section class="panel">
          <div class="section-head">
            <h2>Metric Heatmap</h2>
            <span id="heatmapLabel" class="muted"></span>
          </div>
          <div id="heatmapTable" class="table-wrapper heatmap-wrapper"></div>
        </section>
      </section>

      <section id="loadError" class="load-error" hidden></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
